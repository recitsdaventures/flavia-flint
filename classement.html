<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement — Récits d'Aventures</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: #F0EBE1;
    font-family: 'Georgia', serif;
    color: #3D2B1F;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 16px 20px; }

  /* Header */
  .page-header {
    text-align: center;
    padding: 30px 20px 20px;
    border-bottom: 2px solid #3D2B1F;
    margin-bottom: 0;
  }
  .page-header h1 {
    font-family: 'Georgia', serif;
    font-size: 24px;
    color: #3D2B1F;
    letter-spacing: 1px;
    margin: 0;
  }
  .page-header p {
    font-size: 13px;
    color: #8B6010;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* Onglets */
  .site-tabs { display: flex; border-bottom: 2px solid #3D2B1F; margin-bottom: 20px; }
  .site-tab {
    padding: 12px 24px;
    border: none;
    background: none;
    font-family: 'Georgia', serif;
    font-size: 14px;
    color: #8B6010;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
  }
  .site-tab.active {
    color: #3D2B1F;
    border-bottom-color: #3D2B1F;
    font-weight: 700;
  }
  .site-tab:hover { color: #3D2B1F; }

  /* Tableau */
  table { width: 100%; border-collapse: collapse; font-family: 'Georgia', serif; }
  thead tr { background: #3D2B1F; }
  th {
    padding: 14px 20px; text-align: center; color: #F0EBE1;
    font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
  }
  th.col-rank { width: 120px; }
  th.col-score { width: 200px; }
  td { padding: 16px 20px; text-align: center; border-bottom: 1px solid #E8E0D0; }
  .row-name { font-size: 15px; }
  .row-sub { font-size: 12px; color: #8B6010; margin-top: 3px; }
  .group-row td {
    background: #3D2B1F; color: #F0EBE1; font-size: 12px;
    letter-spacing: 1.5px; text-transform: uppercase; text-align: left;
    padding: 10px 20px;
  }
  .empty-row td { padding: 40px 20px; color: #8B6010; font-size: 14px; }

  /* Footer */
  .site-footer {
    text-align: center; padding: 20px;
    font-family: 'Georgia', serif; font-size: 12px; color: #8B6010;
    border-top: 1px solid #D4C5A9; margin-top: 20px;
  }
  .site-footer a { color: #3D2B1F; font-weight: 700; text-decoration: none; }
</style>
</head>
<body>

<div class="page-header">
  <h1 id="page-title">CLASSEMENT GÉNÉRAL</h1>
  <p>RÉCITS D'AVENTURES</p>
</div>

<div class="wrap">
  <div class="site-tabs">
    <button onclick="setTab('general',this)" class="site-tab active">Classement Général</button>
    <button onclick="setTab('flavia',this)" class="site-tab">Flavia Flint</button>
    <button onclick="setTab('professor',this)" class="site-tab">Professeur Flint</button>
  </div>

  <table>
    <thead>
      <tr>
        <th class="col-rank">Rang</th>
        <th id="th-name">Aventurier</th>
        <th class="col-score">Points de Prestige</th>
      </tr>
    </thead>
    <tbody id="ranking-tbody">
      <tr class="empty-row"><td colspan="3">⏳ Chargement...</td></tr>
    </tbody>
  </table>
</div>

<div class="site-footer">
  Rejoins l'aventure sur <a href="https://flavia-flint.vercel.app" target="_blank">flavia-flint.vercel.app</a>
  &nbsp;·&nbsp; © Récits d'Aventures
</div>

<script>
const SUPA_URL = 'https://qvxbkidbubvaqlonqmpu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2eGJraWRidWJ2YXFsb25xbXB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTM4MTEsImV4cCI6MjA5Nzk2OTgxMX0.YE4p5LCoChFiYJUh63CbiXn0GjZT3y-QptXmUQCYKL0';

const HEADERS = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY };

async function get(table, params = '') {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}${params}`, { headers: HEADERS });
  return res.json();
}

// Rangs joueur — mêmes seuils/titres que dans index.html (univers Flavia Flint)
function getRankName(xp) {
  if (xp >= 2500) return '👑 Héros de l\'Histoire';
  if (xp >= 1500) return '🏆 Maître Explorateur';
  if (xp >= 1000) return '🗝️ Gardien des Secrets';
  if (xp >= 600)  return '🏹 Chasseur de Trésors';
  if (xp >= 300)  return '⚔️ Aventurier';
  if (xp >= 100)  return '🧭 Découvreur';
  return '🌱 Apprenti Explorateur';
}
function cleanRankName(xp) {
  return getRankName(xp).replace(/[👑🏆🗝️🏹⚔️🧭🌱]/gu, '').trim();
}

function formatDuration(seconds) {
  const s = seconds || 0;
  const mins = Math.floor(s / 60);
  const secs = s % 60;
  return `${mins}:${String(secs).padStart(2,'0')}`;
}

const TITLES = { general: 'CLASSEMENT GÉNÉRAL', flavia: 'FLAVIA FLINT', professor: 'PROFESSEUR FLINT' };
const NAME_HEADERS = { general: 'Aventurier', flavia: 'Aventurier', professor: "Nom d'équipe" };

let currentTab = 'general';

async function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.site-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('page-title').textContent = TITLES[tab];
  document.getElementById('th-name').textContent = NAME_HEADERS[tab];
  await loadRanking();
}

function showEmpty(msg) {
  document.getElementById('ranking-tbody').innerHTML =
    `<tr class="empty-row"><td colspan="3">${msg}</td></tr>`;
}

async function loadRanking() {
  const tbody = document.getElementById('ranking-tbody');
  tbody.innerHTML = '<tr class="empty-row"><td colspan="3">⏳ Chargement...</td></tr>';

  try {
    if (currentTab === 'general') {
      const players = await get('players', '?select=pseudo,avatar_emoji,total_xp,city&order=total_xp.desc&limit=20');
      if (!players.length) { showEmpty('Aucun joueur encore — sois le premier ! 🏆'); return; }

      tbody.innerHTML = players.map((p, i) => `
        <tr style="background:${i%2===0?'white':'#FAF7F2'};">
          <td style="font-size:16px;font-weight:700;">${i+1}</td>
          <td class="row-name" style="color:${i<3?'#8B6010':'#3D2B1F'};font-weight:${i<3?'700':'400'};">
            ${p.avatar_emoji || '🧒'} ${p.pseudo || 'Aventurier'}
            <div class="row-sub">${cleanRankName(p.total_xp)}${p.city ? ' · '+p.city : ''}</div>
          </td>
          <td style="font-size:16px;font-weight:700;color:#8B6010;">${p.total_xp || 0}</td>
        </tr>`).join('');

    } else if (currentTab === 'flavia') {
      const completions = await get('adventure_completions',
        '?select=total_duration_seconds,total_xp_earned,players!player_id(pseudo,avatar_emoji),adventures(title,emoji)&order=total_duration_seconds.asc&limit=100');
      if (!completions.length) { showEmpty('Aucune aventure terminée encore !'); return; }

      const byAdventure = {};
      completions.forEach(c => {
        const title = c.adventures?.title || 'Aventure';
        if (!byAdventure[title]) byAdventure[title] = { emoji: c.adventures?.emoji || '🗺️', entries: [] };
        byAdventure[title].entries.push(c);
      });

      tbody.innerHTML = Object.entries(byAdventure).map(([title, data]) => `
        <tr class="group-row"><td colspan="3">${data.emoji} ${title}</td></tr>
        ${data.entries.slice(0, 5).map((c, i) => `
          <tr style="background:${i%2===0?'white':'#FAF7F2'};">
            <td style="font-size:16px;font-weight:700;">${i+1}</td>
            <td class="row-name" style="color:${i<3?'#8B6010':'#3D2B1F'};font-weight:${i<3?'700':'400'};">
              ${c.players?.avatar_emoji || '🧒'} ${c.players?.pseudo || 'Aventurier'}
              <div class="row-sub">⏱ ${formatDuration(c.total_duration_seconds)}</div>
            </td>
            <td style="font-size:16px;font-weight:700;color:#8B6010;">${c.total_xp_earned || 0}</td>
          </tr>`).join('')}`).join('');

    } else if (currentTab === 'professor') {
      // book_participations n'a pas de colonne durée en base : calculée côté client
      const parts = await get('book_participations',
        '?status=eq.completed&select=team_name,team_size,started_at,completed_at,xp_earned,professor_flint_books(title)&order=completed_at.desc&limit=100');
      if (!parts.length) { showEmpty('Aucun livre terminé encore — commandez le vôtre ! 📖'); return; }

      const withDuration = parts
        .map(p => ({
          ...p,
          durationSeconds: (p.started_at && p.completed_at)
            ? Math.max(0, Math.round((new Date(p.completed_at) - new Date(p.started_at)) / 1000))
            : null
        }))
        .filter(p => p.durationSeconds !== null)
        .sort((a, b) => a.durationSeconds - b.durationSeconds)
        .slice(0, 20);

      if (!withDuration.length) { showEmpty('Aucun livre terminé encore — commandez le vôtre ! 📖'); return; }

      tbody.innerHTML = withDuration.map((p, i) => `
        <tr style="background:${i%2===0?'white':'#FAF7F2'};">
          <td style="font-size:16px;font-weight:700;">${i+1}</td>
          <td class="row-name" style="color:${i<3?'#8B6010':'#3D2B1F'};font-weight:${i<3?'700':'400'};">
            ${p.team_name || 'Équipe'}
            <div class="row-sub">${p.professor_flint_books?.title || ''} · ${p.team_size || 1} joueur${p.team_size > 1 ? 's' : ''} · ⏱ ${formatDuration(p.durationSeconds)}</div>
          </td>
          <td style="font-size:16px;font-weight:700;color:#8B6010;">${p.xp_earned || 0}</td>
        </tr>`).join('');
    }

  } catch(e) {
    console.error('Erreur chargement classement:', e);
    showEmpty('Erreur de chargement. Réessaie dans quelques instants.');
  }
}

// Actualisation automatique toutes les 60 secondes
loadRanking();
setInterval(loadRanking, 60000);
</script>
</body>
</html>
